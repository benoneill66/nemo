name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish DMG
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building $TAG"

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST"; fi
          xcodebuild -version

      - name: Build drag-to-install DMG
        run: ./package.sh

      - name: Generate checksum
        run: shasum -a 256 Nemo.dmg | tee Nemo.dmg.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Nemo ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            Nemo.dmg
            Nemo.dmg.sha256
          body: |
            ## Nemo ${{ steps.ver.outputs.tag }}

            A drag-to-install macOS app. Download **Nemo.dmg** below, open it, and drag
            Nemo into Applications.

            > This build is **ad-hoc signed** (no Apple Developer ID), so the first
            > launch needs a right-click → **Open**, or run:
            > `xattr -dr com.apple.quarantine /Applications/Nemo.app`
            >
            > Prefer to build it yourself? `git clone` and run `./install.sh` — a
            > locally built bundle isn't quarantined at all.

            See the [CHANGELOG](https://github.com/benoneill66/nemo/blob/main/CHANGELOG.md)
            for what's new. Auto-generated commit notes follow.
